# ---------------------------------------------------------
# 1. Daemon and Network Settings
# ---------------------------------------------------------
# Run as a standalone daemon (listens on IPv4)
listen=YES
listen_ipv6=NO

# Standard FTP port settings
connect_from_port_20=YES
use_localtime=YES

# Passive Mode (PASV) - Useful for clients behind firewalls
pasv_enable=YES
pasv_min_port=30000
pasv_max_port=30010

# ---------------------------------------------------------
# 2. Access Control (Who can login?)
# ---------------------------------------------------------
# Anonymous login settings
anonymous_enable=YES

# Local user login settings
local_enable=YES
userlist_enable=NO

# PAM service name (usually matches the filename in /etc/pam.d/)
pam_service_name=vsftpd

# Custom banner shown upon connection
ftpd_banner=Welcome to blah FTP service.

# ---------------------------------------------------------
# 3. Permissions and Write Access
# ---------------------------------------------------------
# Global write enable
write_enable=YES

# Anonymous upload and directory permissions
anon_upload_enable=YES
anon_mkdir_write_enable=YES
anon_other_write_enable=YES

# Chroot (Jail) settings
# Fixed: Allow writable chroot is needed if users have write access to their home dir root
allow_writeable_chroot=YES
secure_chroot_dir=/var/run/vsftpd/empty

# ---------------------------------------------------------
# 4. Logging and Display
# ---------------------------------------------------------
# Enable directory messages (e.g. .message files)
dirmessage_enable=YES

# Enable transfer logging
xferlog_enable=YES

# ---------------------------------------------------------
# 5. Security and SSL
# ---------------------------------------------------------
# SSL is currently disabled (set to YES to enable)
ssl_enable=NO
rsa_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
rsa_private_key_file=/etc/ssl/private/ssl-cert-snakeoil.key

